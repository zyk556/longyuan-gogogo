services:
  - type: web
    name: worldcup-tool
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: MIMO_API_URL
        value: https://api.xiaomimimo.com/v1/chat/completions
      - key: MIMO_MODEL
        value: mimo-v2.5
      - key: MIMO_API_KEY
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 1

databases:
  - name: worldcup-db
    plan: free
    databaseName: worldcup
